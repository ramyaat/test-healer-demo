name: Playwright Test Healer

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: "Test file(s) to heal (comma-separated, e.g. tests/posts/create.spec.ts)"
        required: true
        type: string

jobs:
  playwright-healer:
    name: Playwright Healer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      TEST_FILE: ${{ github.event.inputs.test_file }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PROMPT_FILE: .agents/skills/test-healer/SKILL.md
      MAX_ITERATIONS: "50"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright dependencies
        working-directory: playwright
        run: npm ci

      - name: Install playwright-cli globally
        run: npm install -g @playwright/cli

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Set up database
        env:
          RAILS_ENV: test
        run: |
          bin/rails db:create
          bin/rails db:schema:load
          bin/rails db:seed

      - name: Start Rails server
        env:
          RAILS_ENV: test
        run: |
          bin/rails server -p 3000 -d
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/ > /dev/null 2>&1 && echo "Rails server ready" && break
            sleep 1
          done

      - name: Run Playwright Test Healer
        run: .github/scripts/run-playwright-test-healer.sh

      - name: Upload agent output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-agent-output
          path: log/claude-agent-output*.html
          if-no-files-found: ignore
